<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimLiQ | Instinct & Intellect</title>
    <style>
        /* This is the CSS - The "Design" of your site */
        body {
            background-color: #0f1113; /* Dark charcoal */
            color: #e0e0e0; /* Off-white text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            max-width: 600px;
        }

        h1 {
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }

        p {
            font-style: italic;
            line-height: 1.6;
            color: #b0b0b0;
        }

        .cta-button {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
        }

        .cta-button:hover {
            background-color: #cccccc;
        }
