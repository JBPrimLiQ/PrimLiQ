<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received | PrimLiQ</title>
    <style>
        :root {
            --prim-teal: #00cece;
            --dark-bg: #0d0f10;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 20%, #1a1e22 0%, #0d0f10 100%);
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .success-box {
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 {
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #888;
        }

        .close-btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #fff 0%, #a8a8a8 100%);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--prim-teal);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 206, 206, 0.4);
        }
    </style>
</head>
<body>

    <div class="success-box">
        <h2>Mission Received</h2>
        <p>Your inquiry has been successfully transmitted. We will review the details and engage with the necessary precision shortly.</p>
        <!-- This closes the tab since it was opened as a target="_blank" -->
        <a href="#" onclick="window.close(); return false;" class="close-btn">CLOSE SESSION</a>
    </div>

</body>
</html>
